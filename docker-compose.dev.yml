name: unihub-support-service

services:
  support-service:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: unihub-support-service
    env_file:
      - .env
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "8007:8007"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      PORT: 8007
      NODE_ENV: development

      MONGODB_URI: ${MONGODB_URI}
      MONGO_NETWORK_FAMILY: ${MONGO_NETWORK_FAMILY:-4}
      MONGO_SERVER_SELECTION_TIMEOUT_MS: ${MONGO_SERVER_SELECTION_TIMEOUT_MS:-15000}

      REDIS_URL: redis://redis:6379

      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      AUTH_SERVICE_TIMEOUT_MS: ${AUTH_SERVICE_TIMEOUT_MS:-2500}
      AUTH_USER_CACHE_TTL_MS: ${AUTH_USER_CACHE_TTL_MS:-60000}
      AUTH_USER_STALE_TTL_MS: ${AUTH_USER_STALE_TTL_MS:-300000}

      # host.docker.internal lets the container reach services running on your machine
      AUTH_SERVICE_URL: http://host.docker.internal:8001
      NOTIFICATION_SERVICE_URL: http://host.docker.internal:8004
      # club-service owns the shared audit log; see utils/auditServiceClient.js
      CLUB_SERVICE_URL: http://host.docker.internal:8002
      AUDIT_SERVICE_TIMEOUT_MS: ${AUDIT_SERVICE_TIMEOUT_MS:-3000}

      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}

      # AWS — leave empty in dev, s3.util.js uses placeholder URLs when empty
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-unihub-uploads}
      AWS_S3_BASE_URL: ${AWS_S3_BASE_URL:-}
      MAX_ATTACHMENT_SIZE_MB: ${MAX_ATTACHMENT_SIZE_MB:-10}
      MAX_ATTACHMENTS_PER_TICKET: ${MAX_ATTACHMENTS_PER_TICKET:-5}

      # AI chat — same key your club-service academicCalendarExtraction already uses
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SUPPORT_CHAT_MODEL: ${SUPPORT_CHAT_MODEL:-claude-haiku-4-5}
      SUPPORT_CHAT_TIMEOUT_MS: ${SUPPORT_CHAT_TIMEOUT_MS:-15000}
      SUPPORT_CHAT_MAX_TOKENS: ${SUPPORT_CHAT_MAX_TOKENS:-800}
      SUPPORT_CHAT_RATE_LIMIT_PER_HOUR: ${SUPPORT_CHAT_RATE_LIMIT_PER_HOUR:-30}

    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: "no"
    extra_hosts:
      # Allows reaching auth-service and notification-service on the host.
      # Required on Linux. Works automatically on Mac and Windows.
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:7-alpine
    container_name: unihub-support-redis
    ports:
      # 6379 (gateway, internal-only), 6380 (club-service), 6382 (profile-service)
      # are already spoken for elsewhere in this stack — check for collisions on
      # your machine before assuming 6383 is free.
      - "6383:6379"
    restart: "no"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
